name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Tests · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Variables factices : aucune DB / Supabase n'est jamais contactée
      # par les jobs (build statique + vitest unit + playwright sans login).
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      EMAIL_DELIVERY: console
      CRON_SECRET: ci-secret

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests (Vitest)
        run: pnpm test

      - name: Build (Next)
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm test:e2e:install

      - name: E2E smoke (Playwright)
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
